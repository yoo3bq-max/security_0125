<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FORTRESS - STEALTH BARRIER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; }
        .grid-bg { background-image: linear-gradient(#0a0a0a 1px, transparent 1px), linear-gradient(90deg, #0a0a0a 1px, transparent 1px); background-size: 20px 20px; }
        .danger-mode { background-color: #400 !important; animation: flash 0.5s infinite; }
        @keyframes flash { 0% { background-color: #400; } 50% { background-color: #800; } 100% { background-color: #400; } }
    </style>
</head>
<body class="grid-bg min-h-screen p-8 transition-all duration-300" id="body">
    <div class="max-w-4xl mx-auto border-2 border-green-900 bg-black/90 p-8 rounded-lg shadow-[0_0_50px_rgba(0,255,0,0.1)]">
        <header class="flex justify-between items-center border-b border-green-900 pb-4 mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic">FORTRESS <span class="text-xs">v3.0 ALPHA</span></h1>
                <p class="text-[10px] text-green-700 uppercase">Anti-Stealth Carrier Monitoring System</p>
            </div>
            <div id="barrier-status" class="px-6 py-2 border-2 border-green-500 text-green-500 font-bold">READY</div>
        </header>

        <div id="alert-banner" class="hidden bg-yellow-400 text-black p-4 mb-6 font-bold text-center text-xl">
            !!! ステルス覗き見を検知：バリアを展開中 !!!
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="border border-green-900 p-4">
                <span class="text-xs">現在の送信速度 (UPLOAD)</span>
                <div id="up-text" class="text-4xl font-bold text-blue-400">0.00 KB/s</div>
            </div>
            <div class="border border-green-900 p-4">
                <span class="text-xs">キャリア網 監視状態</span>
                <div class="text-xl text-green-500">NTT/KDDI/Softbank 監視中</div>
            </div>
        </div>

        <div class="h-64 border border-green-900 mb-8 p-4">
            <canvas id="fortressChart"></canvas>
        </div>

        <div class="text-[10px] text-green-800 space-y-1 font-mono">
            <p>> LOCALHOAST: 127.0.0.1 Connected</p>
            <p>> ENCRYPTION: Active</p>
            <p>> BARRIER AUTO-SHUTDOWN: Armed</p>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('fortressChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Traffic', data: [], borderColor: '#0f0', borderWidth: 1, fill: true, backgroundColor: 'rgba(0,255,0,0.05)', tension: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, elements: { point: { radius: 0 } } }
        });

        function update() {
            fetch('http://127.0.0.1:5000/api/stats')
                .then(r => r.json())
                .then(d => {
                    document.getElementById('up-text').innerText = d.upload + " KB/s";
                    const body = document.getElementById('body');
                    const status = document.getElementById('barrier-status');
                    const banner = document.getElementById('alert-banner');

                    if (d.level > 0) {
                        body.classList.add('danger-mode');
                        status.innerText = "BARRIER ACTIVE";
                        status.className = "px-6 py-2 border-2 border-red-500 text-red-500 font-bold";
                        banner.classList.remove('hidden');
                    } else {
                        body.classList.remove('danger-mode');
                        status.innerText = "READY";
                        status.className = "px-6 py-2 border-2 border-green-500 text-green-500 font-bold";
                        banner.classList.add('hidden');
                    }

                    chart.data.labels.push("");
                    chart.data.datasets[0].data.push(d.upload);
                    if (chart.data.labels.length > 50) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                    chart.update('none');
                }).catch(() => {
                    document.getElementById('barrier-status').innerText = "DISCONNECTED";
                });
        }
        setInterval(update, 500);
    </script>
</body>
</html>
